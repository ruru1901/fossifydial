name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle          # ← speeds up builds by caching dependencies

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Foss debug APK
        run: ./gradlew assembleFossDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fossify-phone-debug
          path: app/build/outputs/apk/foss/debug/*.apk
          retention-days: 7                         # ← auto-cleanup after 7 days